<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psychedelic Collage Database Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #ff006e 0%, #8338ec 50%, #3a86ff 100%);
      margin-bottom: 30px;
      border-radius: 10px;
    }

    h1 {
      font-size: 3em;
      text-transform: uppercase;
      letter-spacing: 5px;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    }

    .subtitle {
      margin-top: 10px;
      opacity: 0.9;
      font-size: 1.2em;
    }

    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .filter-group {
      flex: 1;
      min-width: 200px;
    }

    .filter-group label {
      display: block;
      margin-bottom: 5px;
      color: #3a86ff;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.9em;
    }

    select, input {
      width: 100%;
      padding: 10px;
      background: #0f0f23;
      border: 2px solid #3a86ff;
      color: #fff;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #ff006e;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 150px;
      background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-number {
      font-size: 2.5em;
      font-weight: bold;
    }

    .stat-label {
      text-transform: uppercase;
      opacity: 0.9;
      font-size: 0.9em;
    }

    .entries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .entry-card {
      background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
      border: 2px solid #3a86ff;
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .entry-card:hover {
      border-color: #ff006e;
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255, 0, 110, 0.3);
    }

    .entry-type {
      display: inline-block;
      background: #8338ec;
      color: #fff;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.8em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .entry-name {
      font-size: 1.4em;
      font-weight: bold;
      margin-bottom: 10px;
      color: #3a86ff;
    }

    .entry-summary {
      opacity: 0.8;
      margin-bottom: 15px;
      font-size: 0.95em;
    }

    .entry-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      background: #0f0f23;
      border: 1px solid #ff006e;
      padding: 3px 10px;
      border-radius: 15px;
      font-size: 0.75em;
      color: #ff006e;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal-content {
      max-width: 900px;
      margin: 50px auto;
      background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
      border: 3px solid #ff006e;
      border-radius: 15px;
      padding: 40px;
    }

    .modal-close {
      float: right;
      font-size: 2em;
      cursor: pointer;
      color: #ff006e;
      line-height: 1;
    }

    .modal-close:hover {
      color: #fff;
    }

    .modal-body {
      margin-top: 30px;
    }

    .detail-section {
      margin-bottom: 30px;
    }

    .detail-section h3 {
      color: #3a86ff;
      margin-bottom: 15px;
      text-transform: uppercase;
      border-bottom: 2px solid #3a86ff;
      padding-bottom: 10px;
    }

    .detail-content {
      background: #0f0f23;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #3a86ff;
    }

    pre {
      background: #000;
      padding: 20px;
      border-radius: 5px;
      overflow-x: auto;
      border: 1px solid #ff006e;
    }

    code {
      color: #3a86ff;
      font-family: 'Courier New', monospace;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.6;
      font-size: 1.5em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌀 Psychedelic Collage Database 🌀</h1>
      <div class="subtitle">A remixable database of psychedelic aesthetics & shader building blocks</div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="filters">
      <div class="filter-group">
        <label>Filter by Type</label>
        <select id="typeFilter">
          <option value="">All Types</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="searchInput" placeholder="Search entries...">
      </div>
    </div>

    <div class="entries-grid" id="entriesGrid"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    let allEntries = [];
    let currentFilter = { type: '', search: '' };

    // Load the database
    async function loadDatabase() {
      try {
        const response = await fetch('./db/indices/entries.json');
        allEntries = await response.json();
        init();
      } catch (error) {
        console.error('Failed to load database:', error);
        document.getElementById('entriesGrid').innerHTML = 
          '<div class="no-results">Failed to load database. Make sure you\'re running a local server.</div>';
      }
    }

    function init() {
      renderStats();
      populateTypeFilter();
      renderEntries();

      // Set up event listeners
      document.getElementById('typeFilter').addEventListener('change', (e) => {
        currentFilter.type = e.target.value;
        renderEntries();
      });

      document.getElementById('searchInput').addEventListener('input', (e) => {
        currentFilter.search = e.target.value.toLowerCase();
        renderEntries();
      });
    }

    function renderStats() {
      const types = {};
      allEntries.forEach(entry => {
        types[entry.type] = (types[entry.type] || 0) + 1;
      });

      const statsHtml = `
        <div class="stat-card">
          <div class="stat-number">${allEntries.length}</div>
          <div class="stat-label">Total Entries</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${Object.keys(types).length}</div>
          <div class="stat-label">Entry Types</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${countUniqueTags()}</div>
          <div class="stat-label">Unique Tags</div>
        </div>
      `;
      document.getElementById('stats').innerHTML = statsHtml;
    }

    function countUniqueTags() {
      const tags = new Set();
      allEntries.forEach(entry => {
        if (entry.tags) {
          Object.entries(entry.tags).forEach(([axis, values]) => {
            const vals = Array.isArray(values) ? values : [values];
            vals.forEach(v => tags.add(`${axis}:${v}`));
          });
        }
      });
      return tags.size;
    }

    function populateTypeFilter() {
      const types = [...new Set(allEntries.map(e => e.type))].sort();
      const select = document.getElementById('typeFilter');
      types.forEach(type => {
        const option = document.createElement('option');
        option.value = type;
        option.textContent = type.replace(/_/g, ' ').toUpperCase();
        select.appendChild(option);
      });
    }

    function filterEntries() {
      return allEntries.filter(entry => {
        // Type filter
        if (currentFilter.type && entry.type !== currentFilter.type) {
          return false;
        }

        // Search filter
        if (currentFilter.search) {
          const searchableText = [
            entry.name,
            entry.summary,
            entry.type,
            entry.id,
            JSON.stringify(entry.tags)
          ].join(' ').toLowerCase();
          
          if (!searchableText.includes(currentFilter.search)) {
            return false;
          }
        }

        return true;
      });
    }

    function renderEntries() {
      const filtered = filterEntries();
      const grid = document.getElementById('entriesGrid');

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="no-results">No entries found matching your filters.</div>';
        return;
      }

      grid.innerHTML = filtered.map(entry => `
        <div class="entry-card" onclick='showEntry(${JSON.stringify(entry.id)})'>
          <div class="entry-type">${entry.type.replace(/_/g, ' ')}</div>
          <div class="entry-name">${entry.name}</div>
          <div class="entry-summary">${entry.summary || 'No summary available'}</div>
          <div class="entry-tags">${renderTags(entry.tags)}</div>
        </div>
      `).join('');
    }

    function renderTags(tags) {
      if (!tags) return '';
      const tagArray = [];
      Object.entries(tags).forEach(([axis, values]) => {
        const vals = Array.isArray(values) ? values : [values];
        vals.forEach(v => tagArray.push(`${axis}: ${v}`));
      });
      return tagArray.slice(0, 8).map(tag => 
        `<span class="tag">${tag}</span>`
      ).join('');
    }

    function showEntry(entryId) {
      const entry = allEntries.find(e => e.id === entryId);
      if (!entry) return;

      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <h2 style="color: #ff006e; margin-bottom: 20px;">${entry.name}</h2>
        <div class="entry-type">${entry.type.replace(/_/g, ' ')}</div>
        
        ${entry.summary ? `
          <div class="detail-section">
            <h3>Summary</h3>
            <div class="detail-content">${entry.summary}</div>
          </div>
        ` : ''}

        ${entry.description ? `
          <div class="detail-section">
            <h3>Description</h3>
            <div class="detail-content">${entry.description}</div>
          </div>
        ` : ''}

        ${entry.tags ? `
          <div class="detail-section">
            <h3>Tags</h3>
            <div class="detail-content">
              ${Object.entries(entry.tags).map(([axis, values]) => {
                const vals = Array.isArray(values) ? values : [values];
                return `<div style="margin-bottom: 10px;">
                  <strong style="color: #3a86ff;">${axis}:</strong> 
                  ${vals.join(', ')}
                </div>`;
              }).join('')}
            </div>
          </div>
        ` : ''}

        ${entry.code || entry.glsl ? `
          <div class="detail-section">
            <h3>Code</h3>
            <pre><code>${escapeHtml(entry.code || entry.glsl || '')}</code></pre>
          </div>
        ` : ''}

        <div class="detail-section">
          <h3>Full Entry Data</h3>
          <pre><code>${JSON.stringify(entry, null, 2)}</code></pre>
        </div>
      `;

      document.getElementById('modal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Close modal on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // Close modal on background click
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    // Load database on page load
    loadDatabase();
  </script>
</body>
</html>
