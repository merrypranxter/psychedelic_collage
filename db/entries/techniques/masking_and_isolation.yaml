id: psc.technique.masking_and_isolation.v1
type: technique
name: Masking and Element Isolation
aliases: [masking, alpha_mask, selection_isolation, subject_extract]
summary: "Isolating elements from source imagery using masks for precise compositional control."
description: |
  Masking is the act of defining which pixels of a layer are visible. In physical
  collage it is the act of cutting; in digital collage it is alpha channel management.

  Types of masks for psychedelic collage:
  - **Hard mask**: binary black/white alpha. Gives scissor-cut feel.
  - **Soft mask**: feathered edges that blend into background. Dreamy / painterly.
  - **Luminosity mask**: built from brightness values of the image itself — bright
    areas visible, dark areas transparent. Good for smoke, hair, soft fabrics.
  - **Color mask**: select by hue range. Good for solid background removal.
  - **AI segmentation mask**: semantic region from model (Segment Anything, REMBG).
    Fast but may need cleanup on complex psychedelic imagery.
  - **Hand-painted mask**: most expressive, most time-consuming.

  In JS/canvas/WebGL: render to offscreen canvas, use composite destination-in
  to apply mask. In GLSL: sample mask texture as alpha channel.
tags:
  medium: [digital, hybrid]
  cut_edge: [scissor, torn, mask_soft]
  composition: [collage_stack]
  mood: [dreamy, uncanny, euphoric]
parameters:
  - name: mask_type
    type: enum
    options: [hard, soft, luminosity, color_range, ai_segment, painted]
    default: soft
  - name: edge_feather_px
    type: float
    default: 2.0
    range: [0.0, 30.0]
    description: "Feather radius for soft/hard edge mask."
  - name: edge_erosion_px
    type: float
    default: 1.0
    range: [0.0, 10.0]
    description: "Erode mask inward to remove AI halo artifacts."
constraints:
  do:
    - "Erode AI-generated masks by 1-3px to remove background halo fringe."
    - "Use luminosity masks for elements with complex or translucent edges."
    - "Save masks as separate files for reuse in other compositions."
  avoid:
    - "Full-auto AI masking on final work without manual touchup on edges."
    - "Hard-erasing pixels in raster layer — use non-destructive masks."
compat:
  works_with:
    - psc.technique.cutout_layering.v1
    - psc.technique.ai_to_collage_constraints.v1
    - psc.technique.compositing_modes.v1
outputs:
  - kind: code_fragment
    value: |
      // canvas 2D: apply mask via destination-in
      ctx.globalCompositeOperation = 'destination-in';
      ctx.drawImage(maskCanvas, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
  - kind: shader_hint
    value: "sample mask texture alpha → multiply against layer alpha → composite"
provenance:
  sources:
    - kind: note
      value: "Fundamental compositing technique applicable to all collage styles"
version: 1
created_at: "2026-04-10"
