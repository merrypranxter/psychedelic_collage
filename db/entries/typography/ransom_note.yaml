id: psc.typography.ransom_note.v1
type: typography
name: Ransom Note Typography
aliases: [ransom_note, cut_letter, mixed_source_type, collage_type]
summary: "Text composed of letters or words cut from different typographic sources and mixed in scale, weight, and style."
description: |
  Ransom note typography assembles a message from cut letters, words, or phrases
  sourced from multiple magazines, newspapers, or printed materials. Each character
  or word block has a different typeface, size, color, and paper type.

  The result communicates urgency, anonymity, and anarchic energy. It's central
  to punk zine culture, protest communication, and collage typography.

  Digital implementation:
  1. Collect scan samples of letters from different print sources.
  2. Mask each letter and place individually on the layout.
  3. Apply slight rotation (±3–8°) and vertical misalignment to each.
  4. Vary scale between adjacent letters.
  5. Optionally: apply different paper texture to each letter's background cell.

  Procedural approach: render text as individual character sprites, then apply
  random transform (rotation, scale, vertical offset) and random texture map to each.
tags:
  typography: [ransom_note, handlettered]
  source: [magazine, scan]
  cut_edge: [scissor, torn]
  texture: [paper_grain, glue, tape]
  composition: [maximalist, border_clutter]
  mood: [chaotic, aggressive, uncanny]
  era: [70s, 90s_rave, contemporary]
parameters:
  - name: rotation_range_deg
    type: float
    default: 6.0
    range: [0.0, 20.0]
    description: "Maximum random rotation per character (degrees, ±)."
  - name: scale_variation
    type: float
    default: 0.3
    range: [0.0, 1.0]
    description: "Relative scale variation between adjacent characters (0 = all same size)."
  - name: vertical_jitter_px
    type: float
    default: 8.0
    range: [0.0, 30.0]
    description: "Maximum vertical position jitter per character."
constraints:
  do:
    - "Vary typeface, weight, and scale for every 1–3 characters."
    - "Apply slight random rotation to each character for physical cut feel."
    - "Use different paper texture backgrounds for blocks of characters."
  avoid:
    - "Perfect alignment — the whole point is the misalignment."
    - "All-one-typeface with only color variation — needs multiple type sources."
compat:
  works_with:
    - psc.style.analog_zine_xerox.v1
    - psc.technique.cutout_layering.v1
    - psc.material.aged_newsprint.v1
outputs:
  - kind: prompt_fragment
    value: "ransom note collage lettering, cut magazine letters, mixed typefaces, anarchic typography"
  - kind: code_fragment
    value: |
      // JS: apply ransom-note randomization to text characters
      function randomizeChars(text, container) {
        [...text].forEach(ch => {
          const span = document.createElement('span');
          span.textContent = ch;
          span.style.transform = `rotate(${(Math.random()-0.5)*12}deg)`;
          span.style.fontSize = `${0.8 + Math.random()*0.8}em`;
          span.style.display = 'inline-block';
          container.appendChild(span);
        });
      }
provenance:
  sources:
    - kind: note
      value: "Punk zine and protest typography tradition"
version: 1
created_at: "2026-04-10"
