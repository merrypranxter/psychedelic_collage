id: psc.palette.acid_vibration.v1
type: palette
name: Acid Vibration
aliases: [acid_palette, 60s_acid, complementary_vibration]
summary: "Maximum-saturation complementary pairs engineered to optically vibrate when placed adjacent."
description: |
  Pairs of complementary colors chosen at full saturation so that when placed
  side-by-side, the eye cannot comfortably rest — the boundary between them
  appears to pulse, bleed, or glow. Primary use: 1960s–70s psychedelic poster work.
  Secondary use: rave/techno visual design.

  The key is to select colors from directly opposite on the HSB color wheel at
  100% saturation and 85–100% brightness. Warm/cool pairs vibrate most intensely:
  orange + blue, yellow + violet, red-orange + cyan, hot pink + lime green.
tags:
  color: [neon, acid]
  print: [screenprint, risograph]
  mood: [euphoric, chaotic]
  era: [60s, 90s_rave]
colors:
  - name: Electric Orange
    hex: "#FF6B00"
    role: dominant
  - name: Cobalt Blue
    hex: "#0047FF"
    role: complement
  - name: Hot Magenta
    hex: "#FF00C8"
    role: accent
  - name: Acid Lime
    hex: "#AAFF00"
    role: complement_accent
  - name: Lemon Zap
    hex: "#FFE600"
    role: secondary
  - name: Deep Violet
    hex: "#5C00FF"
    role: shadow
  - name: Screaming Red
    hex: "#FF1500"
    role: punch
  - name: Cyan Shock
    hex: "#00FFEE"
    role: complement_punch
constraints:
  do:
    - "Place complementary pairs directly adjacent — avoid separating them with neutrals."
    - "Use at maximum 4 colors from this palette in a single composition."
    - "Print/render at full saturation — do not mute."
  avoid:
    - "Adding grey, black, or white as balancing neutrals — kills the vibration."
    - "Using this palette with gradients — vibration requires hard color boundaries."
compat:
  works_with:
    - psc.style.sixties_poster_op_art.v1
    - psc.typography.psychedelic_poster_lettering.v1
    - psc.print_artifact.screenprint_separation.v1
outputs:
  - kind: prompt_fragment
    value: "acid color palette, complementary vibration, fully saturated, hot orange and cobalt blue"
provenance:
  sources:
    - kind: note
      value: "Derived from Victor Moscoso's optical vibration color theory"
version: 1
created_at: "2026-04-10"
